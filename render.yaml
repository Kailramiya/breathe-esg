services:
  - type: web
    name: breathe-esg-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py seed"
    startCommand: "gunicorn breathe.wsgi"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breathe-esg-frontend.onrender.com"

  - type: web
    name: breathe-esg-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://breathe-esg-backend.onrender.com/api"

databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_esg
